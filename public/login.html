<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aria - Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

  <div class="auth-container">
    <div class="auth-header">
      <div class="auth-logo">✨</div>
      <h1>Aria</h1>
      <p>Your personal AI fashion stylist</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Login Form -->
    <div class="auth-form active" id="loginForm">
      <div class="error-msg" id="loginError"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="Enter your email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password" />
      </div>
      <button class="btn-primary" onclick="handleLogin()">Login →</button>
    </div>

    <!-- Signup Form -->
    <div class="auth-form" id="signupForm">
      <div class="error-msg" id="signupError"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="Enter your email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="Choose a password" />
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="signupConfirm" placeholder="Confirm your password" />
      </div>
      <button class="btn-primary" onclick="handleSignup()">Create Account →</button>
    </div>
  </div>

  <script>
    // Theme - runs first
    const savedTheme = localStorage.getItem('aria_theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    document.getElementById('themeBtn').textContent = savedTheme === 'dark' ? '☀️' : '🌙';

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('aria_theme', next);
      document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
    }

    // Redirect if already logged in
    const token = localStorage.getItem('aria_token');
    if (token) window.location.href = 'chat.html';

    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      if (tab === 'login') {
        document.querySelectorAll('.auth-tab')[0].classList.add('active');
        document.getElementById('loginForm').classList.add('active');
      } else {
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
        document.getElementById('signupForm').classList.add('active');
      }
    }

    function showError(id, message) {
      const el = document.getElementById(id);
      el.textContent = message;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 4000);
    }

    async function handleLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!email || !password) {
        return showError('loginError', 'Please fill in all fields');
      }
      try {
        const res = await fetch('https://aria-fashion-stylist.onrender.com/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('aria_token', data.token);
          localStorage.setItem('aria_userId', data.userId);
          if (data.hasProfile) {
            window.location.href = 'chat.html';
          } else {
            window.location.href = 'onboarding.html';
          }
        } else {
          showError('loginError', data.error);
        }
      } catch (err) {
        showError('loginError', 'Could not connect to server');
      }
    }

    async function handleSignup() {
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const confirm = document.getElementById('signupConfirm').value;
      if (!email || !password || !confirm) {
        return showError('signupError', 'Please fill in all fields');
      }
      if (password !== confirm) {
        return showError('signupError', 'Passwords do not match');
      }
      if (password.length < 6) {
        return showError('signupError', 'Password must be at least 6 characters');
      }
      try {
        const res = await fetch('https://aria-fashion-stylist.onrender.com/api/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('aria_token', data.token);
          localStorage.setItem('aria_userId', data.userId);
          window.location.href = 'onboarding.html';
        } else {
          showError('signupError', data.error);
        }
      } catch (err) {
        showError('signupError', 'Could not connect to server');
      }
    }
  </script>
</body>
</html>
